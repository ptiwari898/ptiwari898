name: GitHub Metrics
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # daily at 00:00 UTC

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # Base
          user: ptiwari898
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata

          # Calendar
          plugin_calendar: yes

          # Languages
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 15

          # Commit habits (time-of-day / day-of-week bars)
          plugin_habits: yes
          plugin_habits_charts_type: bars
          plugin_habits_from: 200
          plugin_habits_days: 15
          plugin_habits_facts: yes

          # Topics / most-used tech icons
          plugin_stars: yes
          plugin_stars_limit: 0

          # PageSpeed Insights (needs a Google API key, see note below)
          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_url: https://your-site-url-here.com
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}

          # Music (Spotify) — remove this block entirely if you don't want it
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_playlist: yes
          plugin_music_limit: 4
          plugin_music_token: ${{ secrets.METRICS_MUSIC_TOKEN }}
